<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f1f5f9;
            display:flex;
        }

        /* ================= SIDEBAR ================= */

        .sidebar{
            width:250px;
            height:100vh;
            background:#0f172a;
            color:white;
            position:fixed;
            left:0;
            top:0;
            padding:30px 20px;
        }

        .sidebar h2{
            font-size:28px;
            margin-bottom:40px;
            font-weight:700;
        }

        .sidebar a{
            display:block;
            color:#cbd5e1;
            text-decoration:none;
            padding:14px 18px;
            margin-bottom:15px;
            border-radius:10px;
            transition:0.3s;
            font-size:16px;
        }

        .sidebar a:hover{
            background:#2563eb;
            color:white;
        }

        /* ================= MAIN ================= */

        .main{
            margin-left:250px;
            width:100%;
            padding:35px;
        }

        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
        }

        .topbar h1{
            font-size:34px;
            color:#0f172a;
        }

        /* ================= STATS ================= */

        .stats{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            margin-bottom:30px;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:18px;
            box-shadow:0 5px 15px rgba(0,0,0,0.08);
        }

        .card h3{
            font-size:18px;
            color:#64748b;
            margin-bottom:10px;
        }

        .card p{
            font-size:34px;
            font-weight:700;
            color:#0f172a;
        }

        /* ================= REQUEST BOX ================= */

        .request-box{
            background:white;
            padding:25px;
            border-radius:18px;
            box-shadow:0 5px 15px rgba(0,0,0,0.08);
        }

        .request-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
            flex-wrap:wrap;
            gap:15px;
        }

        .request-header h2{
            color:#0f172a;
        }

        .controls{
            display:flex;
            gap:12px;
        }

        .controls input,
        .controls select{
            padding:12px 15px;
            border:1px solid #cbd5e1;
            border-radius:10px;
            outline:none;
            font-size:14px;
        }

        /* ================= TABLE ================= */

        table{
            width:100%;
            border-collapse:collapse;
            overflow:hidden;
            border-radius:15px;
        }

        thead{
            background:#2563eb;
            color:white;
        }

        th{
            padding:16px;
            text-align:left;
            font-size:15px;
        }

        td{
            padding:16px;
            border-bottom:1px solid #e2e8f0;
            font-size:14px;
            color:#334155;
        }

        tbody tr:hover{
            background:#f8fafc;
        }

        /* ================= STATUS ================= */

        .status{
            padding:7px 14px;
            border-radius:30px;
            color:white;
            font-size:13px;
            font-weight:600;
        }

        .pending{
            background:#f59e0b;
        }

        .approved{
            background:#22c55e;
        }

        .rejected{
            background:#ef4444;
        }

        /* ================= BUTTONS ================= */

        .btn{
            border:none;
            padding:10px 16px;
            border-radius:10px;
            color:white;
            cursor:pointer;
            font-size:13px;
            font-weight:600;
            margin-right:8px;
            transition:0.3s;
        }

        .approve{
            background:#22c55e;
        }

        .approve:hover{
            background:#16a34a;
        }

        .reject{
            background:#ef4444;
        }

        .reject:hover{
            background:#dc2626;
        }

        /* ================= RESPONSIVE ================= */

        @media(max-width:900px){

            .sidebar{
                width:100%;
                height:auto;
                position:relative;
            }

            .main{
                margin-left:0;
            }

            .stats{
                grid-template-columns:1fr;
            }

            table{
                font-size:12px;
            }
        }

    </style>

</head>

<body>


<!-- ================= SIDEBAR ================= -->

<div class="sidebar">

    <h2>DSR Portal</h2>

    <a href="admin.html">
        📋 Dashboard
    </a>

    <a href="#"
       onclick="logout()">
        🚪 Logout
    </a>

</div>



<!-- ================= MAIN ================= -->

<div class="main">

    <div class="topbar">

        <h1>Admin Dashboard</h1>

    </div>



    <!-- ================= STATS ================= -->

    <div class="stats">

        <div class="card">

            <h3>Total Requests</h3>

            <p id="totalRequests">0</p>

        </div>


        <div class="card">

            <h3>Pending</h3>

            <p id="pendingRequests">0</p>

        </div>


        <div class="card">

            <h3>Approved</h3>

            <p id="approvedRequests">0</p>

        </div>


        <div class="card">

            <h3>Rejected</h3>

            <p id="rejectedRequests">0</p>

        </div>

    </div>



    <!-- ================= REQUEST TABLE ================= -->

    <div class="request-box">

        <div class="request-header">

            <h2>User Requests</h2>

            <div class="controls">

                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search user..."
                    onkeyup="applyFilters()"
                >

                <select
                    id="filterStatus"
                    onchange="applyFilters()"
                >

                    <option value="">
                        All Status
                    </option>

                    <option value="PENDING">
                        Pending
                    </option>

                    <option value="APPROVED">
                        Approved
                    </option>

                    <option value="REJECTED">
                        Rejected
                    </option>

                </select>

            </div>

        </div>



        <table>

            <thead>

                <tr>

                    <th>ID</th>

                    <th>User</th>

                    <th>Type</th>

                    <th>Description</th>

                    <th>Status</th>

                    <th>Actions</th>

                </tr>

            </thead>


            <tbody id="requestTable">

            </tbody>

        </table>

    </div>

</div>



<!-- ================= SCRIPT ================= -->

<script>

const BASE_URL =
    "http://localhost:8080/api";

let allRequests = [];



// ================= AUTH =================

const username =
    localStorage.getItem("username");

if (!username) {

    window.location.href =
        "login.html";
}

if (
    username.toLowerCase() !== "admin"
) {

    alert("Access denied");

    window.location.href =
        "dashboard.html";
}



// ================= LOAD REQUESTS =================

function loadRequests() {

    fetch(`${BASE_URL}/requests`)

    .then(res => {

        if(!res.ok){

            throw new Error(
                "Failed to fetch requests"
            );
        }

        return res.json();
    })

    .then(data => {

        console.log(
            "REQUEST DATA:",
            data
        );

        // HANDLE PAGINATION
        allRequests =
            data.content || data;

        displayRequests(allRequests);

        updateStats(allRequests);
    })

    .catch(err => {

        console.error(err);

        alert(
            "Error loading requests"
        );
    });
}

// ================= DISPLAY =================

function displayRequests(data) {

    const table =
        document.getElementById(
            "requestTable"
        );

    table.innerHTML = "";

    if(data.length === 0){

        table.innerHTML = `
            <tr>
                <td colspan="6"
                    style="
                        text-align:center;
                        padding:30px;
                        font-weight:600;
                    ">
                    No requests found
                </td>
            </tr>
        `;

        return;
    }

    data.forEach(r => {

        // ================= FIX FIELD NAMES =================

        const user =
            r.email ||
            r.username ||
            "N/A";

        const type =
            r.requestType ||
            r.type ||
            "N/A";

        const description =
            r.description ||
            r.requestDescription ||
            "No Description";

        const status =
            r.status ||
            "PENDING";

        const statusClass =
            status.toLowerCase();

        // ================= TABLE ROW =================

        table.innerHTML += `

        <tr>

            <td>${r.id}</td>

            <td>${user}</td>

            <td>${type}</td>

            <td>${description}</td>

            <td>

                <span class="status ${statusClass}">
                    ${status}
                </span>

            </td>

            <td>

                <button
                    class="btn approve"
                    onclick="updateStatus(${r.id}, 'APPROVED')"
                >
                    Approve
                </button>

                <button
                    class="btn reject"
                    onclick="updateStatus(${r.id}, 'REJECTED')"
                >
                    Reject
                </button>

            </td>

        </tr>
        `;
    });
}

// ================= FILTER =================

function applyFilters() {

    const search =
        document
        .getElementById("searchInput")
        .value
        .toLowerCase();

    const status =
        document
        .getElementById("filterStatus")
        .value;

    const filtered =
        allRequests.filter(r => {

        return (

            r.email
            .toLowerCase()
            .includes(search)

            &&

            (
                status === ""
                ||
                r.status === status
            )
        );
    });

    displayRequests(filtered);
}



// ================= UPDATE STATUS =================

function updateStatus(id, status) {

    fetch(
        `${BASE_URL}/requests/updateStatus/${id}?status=${status}`,
        {
            method:"PUT"
        }
    )

    .then(() => {

        loadRequests();

        alert(
            `Request ${status}`
        );
    })

    .catch(err => {

        console.error(err);

        alert("Update failed");
    });
}



// ================= STATS =================

function updateStats(data){

    document.getElementById(
        "totalRequests"
    ).innerText = data.length;

    document.getElementById(
        "pendingRequests"
    ).innerText =

        data.filter(r =>
            r.status === "PENDING"
        ).length;

    document.getElementById(
        "approvedRequests"
    ).innerText =

        data.filter(r =>
            r.status === "APPROVED"
        ).length;

    document.getElementById(
        "rejectedRequests"
    ).innerText =

        data.filter(r =>
            r.status === "REJECTED"
        ).length;
}



// ================= LOGOUT =================

function logout(){

    localStorage.clear();

    window.location.href =
        "login.html";
}



// ================= INITIAL =================

loadRequests();

</script>

</body>
</html>
